<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connection Error</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        svg {
            width: 80px;
            height: 80px;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        p {
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
            color: #64748b;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:active {
            background-color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Wi-Fi off icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 011.662 10.963l-1.414-1.414a7.001 7.001 0 00-1.293-8.585l1.045-1.044V5.636z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 011.08 5.75l-1.414-1.414a3 3 0 00-1.636-2.923l1.97-1.413z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.172 6.172A9 9 0 0112 3c1.9 0 3.66.587 5.12 1.586l-1.42 1.42A7 7 0 0012 5C8.134 5 5 8.134 5 12c0 .947.185 1.848.517 2.673l-1.42 1.42A8.966 8.966 0 013.172 6.172z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18l1.414-1.414" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
        </svg>
        
        <h1>Connection Error</h1>
        <p>We couldn't connect to the server. Please check your internet connection and try again.</p>
        
        <button onclick="retry()">Retry</button>
    </div>

    <script>
        function retry() {
            // Reload the main Capacitor app entry point
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
