name: Build Dashboard Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'dashbourd/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Install Dependencies ─────────────────────────────────────────────
      - name: Install Dependencies
        working-directory: ./dashbourd
        run: npm install

      # ── 4. Write .env file ─────────────────────────────────────────────────
      - name: Create .env file
        working-directory: ./dashbourd
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAIL=${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_CLOUDINARY_API_KEY=${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_API_SECRET=${{ secrets.VITE_CLOUDINARY_API_SECRET }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          EOF

      # ── 5. Build the web app ────────────────────────────────────────────────
      - name: Build Web App
        working-directory: ./dashbourd
        run: npm run build

      # ── 6. Java + Gradle ───────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 8. Flexible Android Platform Handling (Add or Sync) ─────────────────
      - name: Sync or Add Android Platform
        run: |
          if [ -d "dashbourd/android" ]; then
            echo "Android folder detected. Syncing web assets..."
            cd dashbourd && npx cap sync android
          else
            echo "Android folder missing. Adding platform..."
            cd dashbourd && npx cap add android
          fi

      # ── 9. Grant Gradle permission ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        working-directory: ./dashbourd/android
        run: chmod +x gradlew

      # ── 9.5 Create google-services.json ────────────────────────────────────
      - name: Create google-services.json
        working-directory: ./dashbourd/android/app
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 secret not found, skipping."
          fi

      # ── 10. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: ./dashbourd/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 11. Build Release AAB (unsigned) ───────────────────────────────────
      - name: Build Release AAB
        working-directory: ./dashbourd/android
        run: ./gradlew bundleRelease --no-daemon

      # ── 11.5 Build Release APK (unsigned) ──────────────────────────────────
      - name: Build Release APK
        working-directory: ./dashbourd/android
        run: ./gradlew assembleRelease --no-daemon

      # ── 12. Sign the Release AAB ───────────────────────────────────────────
      - name: Sign Release AAB
        id: sign_aab
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: dashbourd/android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.DASHBOARD_KEYSTORE_BASE64 }}
          alias: ${{ secrets.DASHBOARD_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.DASHBOARD_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.DASHBOARD_KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      # ── 13. Upload Debug APK artifact ─────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-debug-apk
          path: dashbourd/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 14. Sign the Release APK ───────────────────────────────────────────
      - name: Sign Release APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: dashbourd/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.DASHBOARD_KEYSTORE_BASE64 }}
          alias: ${{ secrets.DASHBOARD_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.DASHBOARD_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.DASHBOARD_KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      # ── 15. Upload Signed Release APK artifact ─────────────────────────────
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-release-apk
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 30

      # ── 16. Upload Signed Release AAB artifact ─────────────────────────────
      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-release-signed-aab
          path: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          retention-days: 30
