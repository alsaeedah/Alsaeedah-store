name: Build Dashboard Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'dashbourd/**'
      - '.github/workflows/dashboard-android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -- 1. Checkout --------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -- 2. Node.js ---------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # -- 3. Install Dependencies --------------------------------------------
      - name: Install Dependencies
        working-directory: ./dashbourd
        run: npm install

      # -- 4. Write .env file -------------------------------------------------
      - name: Create .env file
        working-directory: ./dashbourd
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAIL=${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_CLOUDINARY_API_KEY=${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_API_SECRET=${{ secrets.VITE_CLOUDINARY_API_SECRET }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          EOF

      # -- 5. Build the web app -----------------------------------------------
      - name: Build Web App
        working-directory: ./dashbourd
        run: npm run build

      # -- 6. Java + Gradle ---------------------------------------------------
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # -- 7. Sync or Add Android Platform ------------------------------------
      - name: Sync or Add Android Platform
        run: |
          if [ -d "dashbourd/android" ]; then
            echo "Android folder detected. Syncing web assets..."
            cd dashbourd && npx cap sync android
          else
            echo "Android folder missing. Adding platform..."
            cd dashbourd && npx cap add android
          fi

      # -- 8. Generate App Icons and Splash Screen from store logo ------------
      - name: Install Python imaging library
        run: pip install Pillow

      - name: Generate Android Icons and Splash Screen
        run: |
          python3 << 'PYEOF'
          from PIL import Image
          import os

          LOGO = 'dashbourd/public/logo.png'
          RES_DIR = 'dashbourd/android/app/src/main/res'

          icons = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }

          img = Image.open(LOGO).convert('RGBA')

          for density, size in icons.items():
              out_dir = os.path.join(RES_DIR, density)
              os.makedirs(out_dir, exist_ok=True)
              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(os.path.join(out_dir, 'ic_launcher.png'))
              resized.save(os.path.join(out_dir, 'ic_launcher_round.png'))
              print(f'  Generated {density}: {size}x{size}')

          splash_dir = os.path.join(RES_DIR, 'drawable')
          os.makedirs(splash_dir, exist_ok=True)
          splash = img.resize((1024, 1024), Image.LANCZOS)
          splash.save(os.path.join(splash_dir, 'splash.png'))
          print('  Generated splash.png: 1024x1024')
          print('All assets generated successfully.')
          PYEOF

      # -- 9. Grant Gradle permission -----------------------------------------
      - name: Grant execute permission for gradlew
        working-directory: ./dashbourd/android
        run: chmod +x gradlew

      # -- 10. Create google-services.json ------------------------------------
      - name: Create google-services.json
        working-directory: ./dashbourd/android/app
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 secret not found, skipping."
          fi

      # -- 11. Build Debug APK ------------------------------------------------
      - name: Build Debug APK
        working-directory: ./dashbourd/android
        run: ./gradlew assembleDebug --no-daemon

      # -- 12. Build Release AAB (unsigned) -----------------------------------
      - name: Build Release AAB
        working-directory: ./dashbourd/android
        run: ./gradlew bundleRelease --no-daemon

      # -- 13. Build Release APK (unsigned) -----------------------------------
      - name: Build Release APK
        working-directory: ./dashbourd/android
        run: ./gradlew assembleRelease --no-daemon

      # -- 14. Decode Keystore ------------------------------------------------
      - name: Decode Keystore
        run: |
          echo "${{ secrets.DASHBOARD_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      # -- 15. Sign and Zipalign Release APK ----------------------------------
      - name: Sign Release APK
        run: |
          # Auto-detect the latest installed build-tools version
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign"

          UNSIGNED_APK="dashbourd/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="/tmp/app-release-aligned.apk"
          SIGNED_APK="dashbourd/android/app/build/outputs/apk/release/app-release-signed.apk"

          # Zipalign the unsigned APK
          $ZIPALIGN -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          # Sign with apksigner
          $APKSIGNER sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "${{ secrets.DASHBOARD_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.DASHBOARD_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.DASHBOARD_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          # Verify signature
          $APKSIGNER verify "$SIGNED_APK"
          echo "APK signed successfully: $SIGNED_APK"

      # -- 16. Sign Release AAB -----------------------------------------------
      - name: Sign Release AAB
        run: |
          UNSIGNED_AAB="dashbourd/android/app/build/outputs/bundle/release/app-release.aab"
          SIGNED_AAB="dashbourd/android/app/build/outputs/bundle/release/app-release-signed.aab"

          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "${{ secrets.DASHBOARD_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.DASHBOARD_KEY_PASSWORD }}" \
            -signedjar "$SIGNED_AAB" \
            "$UNSIGNED_AAB" \
            "${{ secrets.DASHBOARD_KEY_ALIAS }}"

          echo "AAB signed successfully: $SIGNED_AAB"

      # -- 17. Upload Debug APK -----------------------------------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-debug-apk
          path: dashbourd/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # -- 18. Upload Signed Release APK --------------------------------------
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-release-apk
          path: dashbourd/android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      # -- 19. Upload Signed Release AAB --------------------------------------
      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-release-signed-aab
          path: dashbourd/android/app/build/outputs/bundle/release/app-release-signed.aab
          retention-days: 30
