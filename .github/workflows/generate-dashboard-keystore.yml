name: Generate Dashboard Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          # Generate a keystore valid for 10000 days
          keytool -genkey -v \
            -keystore dashboard-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias dashboard-key-alias \
            -dname "CN=Alsaeedah Dashboard, OU=Alsaeedah, O=Alsaeedah, L=Sana, S=Sana, C=YE" \
            -storepass alsaeedahdash123 \
            -keypass alsaeedahdash123

          # Base64 encode so it can be copied into GitHub Secrets
          base64 dashboard-keystore.jks > dashboard-keystore-base64.txt

          echo "✅ Dashboard Keystore Generated Successfully"
          echo ""
          echo "Next steps:"
          echo "1. Download the artifact below"
          echo "2. Open dashboard-keystore-base64.txt and copy ALL the text"
          echo "3. Go to GitHub → Settings → Secrets and add:"
          echo "   DASHBOARD_KEYSTORE_BASE64  = (paste the base64 text)"
          echo "   DASHBOARD_KEY_ALIAS        = dashboard-key-alias"
          echo "   DASHBOARD_KEYSTORE_PASSWORD = alsaeedahdash123"
          echo "   DASHBOARD_KEY_PASSWORD      = alsaeedahdash123"

      - name: Upload Keystore Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-android-keystore
          path: |
            dashboard-keystore.jks
            dashboard-keystore-base64.txt
