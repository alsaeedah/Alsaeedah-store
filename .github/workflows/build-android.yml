name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'admin-mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ./admin-mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Inject Firebase JSON and .env
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > GoogleService-Info.plist
          echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" > .env
          echo "CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET }}" >> .env

      - name: Build Android APK
        run: eas build --platform android --profile production --non-interactive --local

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: admin-app-apk
          path: admin-mobile/build-*.apk
