name: "[DEPRECATED] Build Admin Android APK"

# DEPRECATED: admin-mobile has been replaced by dashbourd as the sole source
# of truth per PRD. This workflow is disabled from automatic runs.
# The active workflow is: dashboard-android-build.yml
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This workflow is deprecated. Use dashboard-android-build.yml instead.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./admin-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_ADMIN_EMAIL=${{ secrets.VITE_ADMIN_EMAIL }}" >> .env
          echo "VITE_ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}" >> .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}" >> .env
          echo "VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}" >> .env
          echo "VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}" >> .env
          echo "VITE_CLOUDINARY_API_KEY=${{ secrets.VITE_CLOUDINARY_API_KEY }}" >> .env
          echo "VITE_CLOUDINARY_API_SECRET=${{ secrets.VITE_CLOUDINARY_API_SECRET }}" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Add Android Platform
        run: |
          npx cap add android || npx cap sync android
          
      - name: Build Release APK (unsigned)
        working-directory: ./admin-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ADMIN_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/admin-release.keystore

      - name: Sign Release APK
        run: |
          # Auto-detect the latest installed build-tools version
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign"

          # Dynamically find the APK generated by Gradle anywhere in the android folder
          UNSIGNED_APK=$(find android -name "*.apk" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: Could not find any APK file anywhere in android/"
            exit 1
          fi

          echo "Found APK to sign: $UNSIGNED_APK"
          
          ALIGNED_APK="/tmp/app-release-aligned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release-signed.apk"

          # Create the output directory just in case it doesn't exist so zipalign doesn't fail
          mkdir -p android/app/build/outputs/apk/release/

          # Zipalign
          $ZIPALIGN -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          # Sign with apksigner
          $APKSIGNER sign \
            --ks /tmp/admin-release.keystore \
            --ks-key-alias "${{ secrets.ADMIN_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ADMIN_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ADMIN_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          # Verify
          $APKSIGNER verify "$SIGNED_APK"
          echo "APK signed successfully: $SIGNED_APK"

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-release
          path: admin-mobile/android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
