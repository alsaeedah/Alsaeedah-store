name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          # Generate a keystore valid for 10000 days
          keytool -genkey -v -keystore upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-key-alias -dname "CN=Alsaeedah, OU=Alsaeedah, O=Alsaeedah, L=Sana, S=Sana, C=YE" -storepass alsaeedah123 -keypass alsaeedah123
          
          # Base64 encode it so it can be copied into GitHub Secrets
          base64 upload-keystore.jks > keystore-base64.txt
          
          echo "✅ Keystore Generated Successfully"
          echo "Please download the artifact, open keystore-base64.txt, and copy its contents."

      - name: Upload Keystore Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            upload-keystore.jks
            keystore-base64.txt
