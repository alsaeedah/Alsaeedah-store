name: Generate Admin Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias (e.g., admin_key)'
        required: true
        default: 'admin_key'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        env:
          KEY_PASSWORD: ${{ secrets.ADMIN_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.ADMIN_KEYSTORE_PASSWORD }}
          ALIAS: ${{ github.event.inputs.alias }}
        run: |
          if [ -z "$KEY_PASSWORD" ] || [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "Error: ADMIN_KEY_PASSWORD and ADMIN_KEYSTORE_PASSWORD secrets must be set."
            exit 1
          fi
          
          keytool -genkey -v -keystore admin-release.keystore -alias $ALIAS -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Alsaeedah Admin, OU=Admin, O=Alsaeedah, L=Riyadh, ST=Riyadh, C=SA" -storepass $KEYSTORE_PASSWORD -keypass $KEY_PASSWORD
          
          echo "KEYSTORE_BASE64=$(base64 -w 0 admin-release.keystore)" >> $GITHUB_ENV

      - name: Print Instructions
        run: |
          echo "Keystore generated successfully!"
          echo "Please add the following as a GitHub Secret named ADMIN_KEYSTORE_BASE64:"
          echo "================================================================="
          echo "${{ env.KEYSTORE_BASE64 }}"
          echo "================================================================="
