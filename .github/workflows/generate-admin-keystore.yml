name: Generate Admin Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'admin_key'
      password:
        description: 'Keystore and Key Password (Must be at least 6 characters)'
        required: true
        default: 'AlSaeedah2026'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        env:
          ALIAS: ${{ github.event.inputs.alias }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          keytool -genkey -v -keystore admin-release.keystore -alias $ALIAS -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Alsaeedah Admin, OU=Admin, O=Alsaeedah, L=Riyadh, ST=Riyadh, C=SA" -storepass $PASSWORD -keypass $PASSWORD
          
          echo "KEYSTORE_BASE64=$(base64 -w 0 admin-release.keystore)" >> $GITHUB_ENV

      - name: Print Instructions
        run: |
          echo "Keystore generated successfully!"
          echo ""
          echo "Please add the following 4 secrets to your GitHub repository (Settings -> Secrets -> Actions):"
          echo ""
          echo "1. ADMIN_KEY_ALIAS = ${{ github.event.inputs.alias }}"
          echo "2. ADMIN_KEYSTORE_PASSWORD = ${{ github.event.inputs.password }}"
          echo "3. ADMIN_KEY_PASSWORD = ${{ github.event.inputs.password }}"
          echo "4. ADMIN_KEYSTORE_BASE64 = (Copy the long string below)"
          echo ""
          echo "====================== COPY BELOW THIS LINE ======================"
          echo "${{ env.KEYSTORE_BASE64 }}"
          echo "================================================================="
