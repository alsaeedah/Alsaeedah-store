name: Build Android App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: ./AL-SAEEDAH
        run: npm ci || npm install

      - name: Build Web App
        working-directory: ./AL-SAEEDAH
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Sync Capacitor
        working-directory: ./AL-SAEEDAH
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: ./AL-SAEEDAH/android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: ./AL-SAEEDAH/android
        run: ./gradlew assembleDebug

      - name: Build Android App Bundle (AAB)
        working-directory: ./AL-SAEEDAH/android
        run: ./gradlew bundleRelease

      - name: Sign AAB for Google Play
        id: sign_app
        uses: r0adkll/sign-android-release@v1.0.4
        with:
          releaseDirectory: AL-SAEEDAH/android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Upload Unsigned Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: AL-SAEEDAH/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
